name: CI

on: [push, pull_request]

permissions: read-all

env:
  XCODE_PROJECT: "rawm.xcodeproj"
  XCODE_SCHEME: "rawm"
  CODE_SIGN_IDENTITY: "-"
  BUILD_DIR: "build"
  XCODE_ARCHIVE: "rawm.xcarchive"
  APP_NAME: "rawm.app"
  EXPORT_OPTIONS_PLIST: "exportOptions.plist"
  DMG_NAME: "rawm"
  DMG_FILE_NAME: "rawm.dmg"

jobs:
  # ---------------------------------------------------------------------------
  # Tests + coverage gate. This MUST pass before anything is built/packaged.
  # `make coverage` runs the suite with coverage instrumentation and then
  # enforces the floor in coverage-thresholds.json (line via xccov, region via
  # llvm-cov). A test failure OR a coverage regression fails this job, which
  # blocks the build job below.
  # ---------------------------------------------------------------------------
  test:
    name: Test & coverage gate
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version
          jq --version

      - name: Run tests + enforce coverage gate
        run: make coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: build/TestResults.xcresult
          if-no-files-found: warn

      - name: Upload coverage thresholds (record of the gate)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-thresholds
          path: coverage-thresholds.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Build + package. Runs only after `test` passes (needs: test).
  # ---------------------------------------------------------------------------
  build:
    name: Build & package
    needs: test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build archive
        run: |
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" archive \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES \
            -archivePath "$BUILD_DIR/$XCODE_ARCHIVE"

      - name: Export
        run: |
          plutil -convert xml1 - -o "$EXPORT_OPTIONS_PLIST" << EOF
            {
              "destination": "export",
              "method": "mac-application"
            }
          EOF

          xcodebuild -exportArchive -archivePath "$BUILD_DIR/$XCODE_ARCHIVE" \
            -exportPath "$BUILD_DIR" -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Resign app
        run: codesign --force --deep -s "$CODE_SIGN_IDENTITY" "$BUILD_DIR/$APP_NAME"

      - name: Make DMG
        run: hdiutil create -srcdir "$BUILD_DIR/$APP_NAME" -volname "$DMG_NAME" "$DMG_FILE_NAME"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Build
          path: ${{ env.DMG_FILE_NAME }}
